blueprint:
  name: Home Connect Local - Done Reminder and Event Notifications
  description: >
    Notifications for Home Connect Local appliances.
    Sends a cycle-done notification, repeats it until the door is opened,
    and sends custom notifications for boolean event/error entities.
  domain: automation

  input:
    appliance_name:
      name: Appliance name
      default: "Bosch Washer"
      selector:
        text:

    notify_service:
      name: Mobile notify service
      description: "Example: notify.mobile_app_pixel_9a"
      selector:
        text:

    done_entity:
      name: Program finished entity
      description: "For your washer: binary_sensor.bosch_washer_program_finished"
      selector:
        entity:

    done_state:
      name: Done active state
      default: "on"
      selector:
        text:

    door_entity:
      name: Door entity
      description: "For your washer: sensor.bosch_washer_door"
      selector:
        entity:

    door_open_states:
      name: Door open states
      description: >
        States that stop the reminder loop. For your washer, use open and ajar.
      default:
        - open
        - ajar
      selector:
        object:

    repeat_minutes:
      name: Repeat interval
      default: 30
      selector:
        number:
          min: 1
          max: 240
          unit_of_measurement: minutes
          mode: box

    event_entities:
      name: Event/error boolean entities
      selector:
        entity:
          multiple: true

    event_active_state:
      name: Event active state
      default: "on"
      selector:
        text:

    event_text_map:
      name: Custom event text map
      description: >
        Map entity_id to notification text.
      default: {}
      selector:
        object:

    default_event_text:
      name: Default event text
      default: "Home Connect Local event is active."
      selector:
        text:

mode: restart

trigger:
  - platform: state
    entity_id: !input done_entity
    to: !input done_state
    id: cycle_done

  - platform: state
    entity_id: !input event_entities
    to: !input event_active_state
    id: appliance_event

variables:
  appliance_name: !input appliance_name
  notify_service: !input notify_service
  door_entity: !input door_entity
  door_open_states: !input door_open_states
  repeat_minutes: !input repeat_minutes
  event_text_map: !input event_text_map
  default_event_text: !input default_event_text

action:
  - choose:
      - conditions:
          - condition: trigger
            id: cycle_done
        sequence:
          - service: "{{ notify_service }}"
            data:
              title: "{{ appliance_name }} finished"
              message: "{{ appliance_name }} is done. Open the door to stop reminders."

          - repeat:
              until:
                - condition: template
                  value_template: >
                    {{ states(door_entity) | lower in door_open_states }}
              sequence:
                - delay:
                    minutes: !input repeat_minutes

                - condition: template
                  value_template: >
                    {{ states(door_entity) | lower not in door_open_states }}

                - service: "{{ notify_service }}"
                  data:
                    title: "{{ appliance_name }} still finished"
                    message: "{{ appliance_name }} is still done. Open the door to stop reminders."

      - conditions:
          - condition: trigger
            id: appliance_event
        sequence:
          - service: "{{ notify_service }}"
            data:
              title: "{{ appliance_name }} event"
              message: >
                {% set entity = trigger.entity_id %}
                {% set friendly = state_attr(entity, 'friendly_name') or entity %}
                {% set custom_text = event_text_map.get(entity, default_event_text) %}
                {{ custom_text }}

                Entity: {{ friendly }}
                State: {{ trigger.to_state.state }}
