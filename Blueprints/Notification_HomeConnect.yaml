blueprint:
  name: Home Connect Local - Done Reminder and Event Notifications
  description: >
    Notifications for Home Connect Local appliances.
    Sends a cycle-done notification, repeats it until the door is opened,
    and sends custom notifications for selected boolean event/error entities.
  domain: automation

  input:
    appliance_name:
      name: Appliance name
      default: "Bosch Washer"
      selector:
        text:

    notify_service:
      name: Mobile notify service
      description: "Example: notify.mobile_app_pixel_9a"
      selector:
        text:

    done_entity:
      name: Program finished entity
      description: "For your washer: binary_sensor.bosch_washer_program_finished"
      selector:
        entity:

    done_state:
      name: Done active state
      default: "on"
      selector:
        text:

    door_entity:
      name: Door entity
      description: "For your washer: sensor.bosch_washer_door"
      selector:
        entity:

    door_open_states:
      name: Door open states
      description: "For your washer, use open and ajar."
      default:
        - open
        - ajar
      selector:
        object:

    repeat_minutes:
      name: Repeat interval
      default: 30
      selector:
        number:
          min: 1
          max: 240
          unit_of_measurement: minutes
          mode: box

    event_active_state:
      name: Event active state
      default: "on"
      selector:
        text:

    event_1_entity:
      name: Event 1 entity
      default: ""
      selector:
        text:

    event_1_text:
      name: Event 1 notification text
      default: ""
      selector:
        text:

    event_2_entity:
      name: Event 2 entity
      default: ""
      selector:
        text:

    event_2_text:
      name: Event 2 notification text
      default: ""
      selector:
        text:

    event_3_entity:
      name: Event 3 entity
      default: ""
      selector:
        text:

    event_3_text:
      name: Event 3 notification text
      default: ""
      selector:
        text:

    event_4_entity:
      name: Event 4 entity
      default: ""
      selector:
        text:

    event_4_text:
      name: Event 4 notification text
      default: ""
      selector:
        text:

    event_5_entity:
      name: Event 5 entity
      default: ""
      selector:
        text:

    event_5_text:
      name: Event 5 notification text
      default: ""
      selector:
        text:

    event_6_entity:
      name: Event 6 entity
      default: ""
      selector:
        text:

    event_6_text:
      name: Event 6 notification text
      default: ""
      selector:
        text:

    event_7_entity:
      name: Event 7 entity
      default: ""
      selector:
        text:

    event_7_text:
      name: Event 7 notification text
      default: ""
      selector:
        text:

    event_8_entity:
      name: Event 8 entity
      default: ""
      selector:
        text:

    event_8_text:
      name: Event 8 notification text
      default: ""
      selector:
        text:

    event_9_entity:
      name: Event 9 entity
      default: ""
      selector:
        text:

    event_9_text:
      name: Event 9 notification text
      default: ""
      selector:
        text:

    event_10_entity:
      name: Event 10 entity
      default: ""
      selector:
        text:

    event_10_text:
      name: Event 10 notification text
      default: ""
      selector:
        text:

    event_11_entity:
      name: Event 11 entity
      default: ""
      selector:
        text:

    event_11_text:
      name: Event 11 notification text
      default: ""
      selector:
        text:

    event_12_entity:
      name: Event 12 entity
      default: ""
      selector:
        text:

    event_12_text:
      name: Event 12 notification text
      default: ""
      selector:
        text:

mode: restart

trigger:
  - platform: event
    event_type: state_changed

variables:
  appliance_name: !input appliance_name
  notify_service: !input notify_service
  done_entity: !input done_entity
  done_state: !input done_state
  door_entity: !input door_entity
  door_open_states: !input door_open_states
  repeat_minutes: !input repeat_minutes
  event_active_state: !input event_active_state

  event_1_entity: !input event_1_entity
  event_1_text: !input event_1_text
  event_2_entity: !input event_2_entity
  event_2_text: !input event_2_text
  event_3_entity: !input event_3_entity
  event_3_text: !input event_3_text
  event_4_entity: !input event_4_entity
  event_4_text: !input event_4_text
  event_5_entity: !input event_5_entity
  event_5_text: !input event_5_text
  event_6_entity: !input event_6_entity
  event_6_text: !input event_6_text
  event_7_entity: !input event_7_entity
  event_7_text: !input event_7_text
  event_8_entity: !input event_8_entity
  event_8_text: !input event_8_text
  event_9_entity: !input event_9_entity
  event_9_text: !input event_9_text
  event_10_entity: !input event_10_entity
  event_10_text: !input event_10_text
  event_11_entity: !input event_11_entity
  event_11_text: !input event_11_text
  event_12_entity: !input event_12_entity
  event_12_text: !input event_12_text

  changed_entity: "{{ trigger.event.data.entity_id }}"
  new_state: "{{ trigger.event.data.new_state.state if trigger.event.data.new_state is not none else '' }}"

condition:
  - condition: template
    value_template: >
      {{
        trigger.event.data.new_state is not none
        and trigger.event.data.old_state is not none
        and trigger.event.data.new_state.state != trigger.event.data.old_state.state
      }}

action:
  - choose:
      - conditions:
          - condition: template
            value_template: >
              {{ changed_entity == done_entity and new_state == done_state }}
        sequence:
          - service: "{{ notify_service }}"
            data:
              title: "{{ appliance_name }} finished"
              message: "{{ appliance_name }} is done. Open the door to stop reminders."

          - repeat:
              until:
                - condition: template
                  value_template: >
                    {{ states(door_entity) | lower in door_open_states }}
              sequence:
                - delay:
                    minutes: !input repeat_minutes

                - condition: template
                  value_template: >
                    {{ states(door_entity) | lower not in door_open_states }}

                - service: "{{ notify_service }}"
                  data:
                    title: "{{ appliance_name }} still finished"
                    message: "{{ appliance_name }} is still done. Open the door to stop reminders."

      - conditions:
          - condition: template
            value_template: >
              {{ changed_entity == event_1_entity and new_state == event_active_state and event_1_entity != '' }}
        sequence:
          - service: "{{ notify_service }}"
            data:
              title: "{{ appliance_name }} event"
              message: "{{ event_1_text }}"

      - conditions:
          - condition: template
            value_template: >
              {{ changed_entity == event_2_entity and new_state == event_active_state and event_2_entity != '' }}
        sequence:
          - service: "{{ notify_service }}"
            data:
              title: "{{ appliance_name }} event"
              message: "{{ event_2_text }}"

      - conditions:
          - condition: template
            value_template: >
              {{ changed_entity == event_3_entity and new_state == event_active_state and event_3_entity != '' }}
        sequence:
          - service: "{{ notify_service }}"
            data:
              title: "{{ appliance_name }} event"
              message: "{{ event_3_text }}"

      - conditions:
          - condition: template
            value_template: >
              {{ changed_entity == event_4_entity and new_state == event_active_state and event_4_entity != '' }}
        sequence:
          - service: "{{ notify_service }}"
            data:
              title: "{{ appliance_name }} event"
              message: "{{ event_4_text }}"

      - conditions:
          - condition: template
            value_template: >
              {{ changed_entity == event_5_entity and new_state == event_active_state and event_5_entity != '' }}
        sequence:
          - service: "{{ notify_service }}"
            data:
              title: "{{ appliance_name }} event"
              message: "{{ event_5_text }}"

      - conditions:
          - condition: template
            value_template: >
              {{ changed_entity == event_6_entity and new_state == event_active_state and event_6_entity != '' }}
        sequence:
          - service: "{{ notify_service }}"
            data:
              title: "{{ appliance_name }} event"
              message: "{{ event_6_text }}"

      - conditions:
          - condition: template
            value_template: >
              {{ changed_entity == event_7_entity and new_state == event_active_state and event_7_entity != '' }}
        sequence:
          - service: "{{ notify_service }}"
            data:
              title: "{{ appliance_name }} event"
              message: "{{ event_7_text }}"

      - conditions:
          - condition: template
            value_template: >
              {{ changed_entity == event_8_entity and new_state == event_active_state and event_8_entity != '' }}
        sequence:
          - service: "{{ notify_service }}"
            data:
              title: "{{ appliance_name }} event"
              message: "{{ event_8_text }}"

      - conditions:
          - condition: template
            value_template: >
              {{ changed_entity == event_9_entity and new_state == event_active_state and event_9_entity != '' }}
        sequence:
          - service: "{{ notify_service }}"
            data:
              title: "{{ appliance_name }} event"
              message: "{{ event_9_text }}"

      - conditions:
          - condition: template
            value_template: >
              {{ changed_entity == event_10_entity and new_state == event_active_state and event_10_entity != '' }}
        sequence:
          - service: "{{ notify_service }}"
            data:
              title: "{{ appliance_name }} event"
              message: "{{ event_10_text }}"

      - conditions:
          - condition: template
            value_template: >
              {{ changed_entity == event_11_entity and new_state == event_active_state and event_11_entity != '' }}
        sequence:
          - service: "{{ notify_service }}"
            data:
              title: "{{ appliance_name }} event"
              message: "{{ event_11_text }}"

      - conditions:
          - condition: template
            value_template: >
              {{ changed_entity == event_12_entity and new_state == event_active_state and event_12_entity != '' }}
        sequence:
          - service: "{{ notify_service }}"
            data:
              title: "{{ appliance_name }} event"
              message: "{{ event_12_text }}"
